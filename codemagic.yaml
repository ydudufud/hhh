workflows:
  target-app-build:
    name: Target App Build
    environment:
      flutter: 3.22.0
    scripts:
      - name: Clean build
        script: flutter clean
      - name: Get dependencies
        script: flutter pub get
      - name: Build APK
        script: flutter build apk --release
    artifacts:
      - build/app/outputs/flutter-apk/app-release.apk
